<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager | Mira Psicóloga</title>
  
  <!-- Decap CMS styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/decap-cms@3.3.3/dist/decap-cms.css" />

  <style>
    /* Custom styles for CMS */
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }
    
    /* Hide the CMS from search engines */
    .cms__header {
      background: #1a1a2e;
      border-bottom: 1px solid #16213e;
    }
    
    /* Custom branding */
    .NcMediaLibrary_bottom {
      background: #f8f9fa;
    }
    
    /* Loading screen */
    .Loading-Starting {
      background: #1a1a2e;
      color: white;
    }
    
    .Starting-spinner {
      border-color: #e94560;
      border-top-color: transparent;
    }
  </style>
</head>
<body>
  <!-- Decap CMS will mount here -->
  <div id="nc-root"></div>
  
  <!-- Decap CMS script (auto-initializes from config.yml in same directory) -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.3.3/dist/decap-cms.js"></script>
</body>
</html>
